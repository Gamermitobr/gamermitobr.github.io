<!DOCTYPE html>
<html lang="pt-br" class="notranslate" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google" content="notranslate">
  <title>Painel Admin</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #0f0f0f;
      color: #f1f1f1;
      padding: 15px;
      margin: 0;
    }
    h1, h3 { text-align: center; margin: 0 0 15px 0; }
    .box {
      background-color: #1a1a1a;
      padding: 20px;
      border-radius: 12px;
      max-width: 500px;
      margin: 20px auto;
    }
    input {
      width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px;
      border: none; background-color: #2a2a2a; color: #fff; box-sizing: border-box;
    }
    button {
      width: 100%; padding: 12px; background-color: #00c853; color: white;
      border: none; border-radius: 8px; font-size: 16px; cursor: pointer;
    }
    button.delete { background-color: #ff1744; margin-top: 8px; }
    button.secondary { 
      background-color: #2a2a2a; border: 1px solid #3a3a3a; margin-bottom: 10px; 
    }
    .item-vaquinha {
      background: #2a2a2a; padding: 14px; margin-top: 12px;
      border-radius: 8px; border-left: 3px solid #00c853;
    }
    .item-vaquinha b { font-size: 17px; display: block; margin-bottom: 6px; }
    .item-vaquinha .info { font-size: 14px; color: #bdbdbd; line-height: 1.5; }
    .alert { padding: 12px; border-radius: 8px; margin-top: 10px; text-align: center; }
    .alert.error { background: #4a1515; color: #ff5252; }
    .hidden { display: none; }
  </style>
</head>

<body class="notranslate">

<h1>⚙️ Painel Admin</h1>

<div class="box" id="loginBox">
  <h3>Acesso restrito</h3>
  <input type="password" id="senha" placeholder="Digite a senha">
  <button onclick="entrar()">Entrar</button>
</div>

<div class="box hidden" id="painel">
  <h3>Bem-vindo ao painel</h3>
  <button class="secondary" onclick="listar()">Atualizar Lista</button>
  <div id="lista"></div>
</div>

<script type="module">
import { supabase } from './supabase.js'

const SENHA = "@Robin33"

window.entrar = function() {
  if (senha.value === SENHA) {
    loginBox.classList.add("hidden")
    painel.classList.remove("hidden")
    listar()
  } else {
    alert("Senha errada")
  }
}

window.listar = async function() {
  const { data, error } = await supabase
    .from('campaigns')
    .select('*')
    .order('created_at', { ascending: false })

  console.log('Listar:', { data, error })

  if (error) {
    lista.innerHTML = `<div class="alert error">Erro: ${error.message}</div>`
    return
  }

  if (!data || data.length === 0) {
    lista.innerHTML = `<div class="alert">Nenhuma vaquinha cadastrada.</div>`
    return
  }

  lista.innerHTML = ""
  data.forEach(item => {
    lista.innerHTML += `
      <div class="item-vaquinha">
        <b>${item.title}</b>
        <div class="info">
          Meta: R$ ${item.goal}<br>
          Arrecadado: R$ ${item.current_amount}
        </div>
        <button class="delete" onclick="excluirVaquinha('${item.id}', '${item.title.replace(/'/g, "\\'")}')">Excluir</button>
      </div>
    `
  })
}

window.excluirVaquinha = async function(id, titulo) {
  const confirmar = confirm(`EXCLUIR PERMANENTEMENTE "${titulo}"?`)
  if (!confirmar) return

  const { error } = await supabase
    .from('campaigns')
    .delete()
    .eq('id', id)

  console.log('Delete:', { error })

  if (error) {
    alert(`Erro ao excluir: ${error.message}`)
  } else {
    alert('Vaquinha excluída com sucesso')
    listar()
  }
}
</script>

</body>
</html>
