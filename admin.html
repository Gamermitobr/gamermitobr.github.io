<script type="module">
import { supabase } from './supabase.js'

const SENHA = "@Robin33"

window.entrar = function() {
  if (senha.value === SENHA) {
    loginBox.classList.add("hidden")
    painel.classList.remove("hidden")
    listar()
  } else {
    alert("Senha errada")
  }
}

window.listar = async function() {
  const { data, error } = await supabase
    .from('campanhas') // MUDOU AQUI
    .select('*')
    .order('created_at', { ascending: false })

  if (error) {
    lista.innerHTML = `<div class="alert error">Erro ao carregar: ${error.message}</div>`
    return
  }

  if (data.length === 0) {
    lista.innerHTML = `<div class="alert">Nenhuma vaquinha cadastrada.</div>`
    return
  }

  lista.innerHTML = ""
  data.forEach(item => {
    lista.innerHTML += `
      <div class="item-vaquinha">
        <b>${item.titulo}</b>
        <div class="info">
          Meta: R$ ${item.meta}<br>
          Arrecadado: R$ ${item.valor_atual}
        </div>
        <button class="delete" onclick="excluirVaquinha('${item.id}', '${item.titulo.replace(/'/g, "\\'")}')">Excluir</button>
      </div>
    `
  })
}

window.excluirVaquinha = async function(id, titulo) {
  const confirmar = confirm(`Tem certeza que quer EXCLUIR PERMANENTEMENTE "${titulo}"?\n\nEssa ação não pode ser desfeita.`)
  if (!confirmar) return

  const { error } = await supabase
    .from('campanhas') // MUDOU AQUI
    .delete()
    .eq('id', id)

  if (error) {
    alert(`Erro ao excluir: ${error.message}`)
  } else {
    alert('Vaquinha excluída com sucesso')
    listar()
  }
}
</script>
