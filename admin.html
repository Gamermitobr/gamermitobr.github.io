<script type="module">
import { supabase } from './supabase.js'

const SENHA = "@Robin33" // 🔐 MUDE AQUI

window.entrar = function() {
  if (senha.value === SENHA) {
    loginBox.classList.add("hidden")
    painel.classList.remove("hidden")
    listar() // já carrega a lista quando loga
  } else {
    alert("Senha errada")
  }
}

window.listar = async function() {
  const { data, error } = await supabase
    .from('campaigns')
    .select('*')
    .order('created_at', { ascending: false })

  if (error) {
    lista.innerHTML = `<p style="color:#ff5252">Erro ao carregar: ${error.message}</p>`
    return
  }

  if (data.length === 0) {
    lista.innerHTML = `<p>Nenhuma vaquinha cadastrada.</p>`
    return
  }

  lista.innerHTML = ""
  data.forEach(item => {
    lista.innerHTML += `
      <div style="background:#2a2a2a; padding:12px; margin-top:10px; border-radius:8px;">
        <b>${item.title}</b><br>
        Meta: R$ ${item.goal}<br>
        Arrecadado: R$ ${item.current_amount}<br>
        Status: ${item.status || 'ativa'}<br>
        <button 
          style="background:#ff1744; margin-top:8px" 
          onclick="excluirVaquinha('${item.id}', '${item.title.replace(/'/g, "\\'")}')"
        >
          Excluir
        </button>
      </div>
    `
  })
}

window.excluirVaquinha = async function(id, titulo) {
  const confirmar = confirm(`Tem certeza que quer excluir a vaquinha "${titulo}"?\n\nIsso vai apagar ela do banco.`)
  if (!confirmar) return

  const { error } = await supabase
    .from('campaigns')
    .delete()
    .eq('id', id)

  if (error) {
    alert(`Erro ao excluir: ${error.message}`)
  } else {
    alert('Vaquinha excluída com sucesso')
    listar() // recarrega a lista
  }
}
</script>
