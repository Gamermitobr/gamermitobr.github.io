<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #0f0f0f;
      color: #f1f1f1;
      padding: 15px;
      margin: 0;
    }

    h1, h3 {
      text-align: center;
      margin: 0 0 15px 0;
    }

    .box {
      background-color: #1a1a1a;
      padding: 20px;
      border-radius: 12px;
      max-width: 500px;
      margin: 20px auto;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: none;
      background-color: #2a2a2a;
      color: #fff;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #00c853;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    button.delete {
      background-color: #ff1744;
      margin-top: 8px;
    }

    button.secondary {
      background-color: #2a2a2a;
      border: 1px solid #3a3a3a;
      margin-bottom: 10px;
    }

    .item-vaquinha {
      background: #2a2a2a;
      padding: 14px;
      margin-top: 12px;
      border-radius: 8px;
      border-left: 3px solid #00c853;
    }

    .item-vaquinha.excluida {
      border-left: 3px solid #ff1744;
      opacity: 0.6;
    }

    .item-vaquinha b {
      font-size: 17px;
      display: block;
      margin-bottom: 6px;
    }

    .item-vaquinha .info {
      font-size: 14px;
      color: #bdbdbd;
      line-height: 1.5;
    }

    .alert {
      padding: 12px
