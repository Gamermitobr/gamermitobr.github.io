<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vaquinha</title>
  <style>
    body {
      background-color: #0f0f0f;
      color: #ffffff;
      font-family: Arial;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      margin: auto;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .desc {
      color: #9e9e9e;
      margin-bottom: 20px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .progress-bar {
      background: #2a2a2a;
      height: 8px;
      border-radius: 4px;
      margin-bottom: 8px;
    }

    .progress {
      background: #00c853;
      height: 100%;
      border-radius: 4px;
    }

    .values {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .values .green {
      color: #00c853;
      font-weight: bold;
    }

    .box {
      background-color: #1a1a1a;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 16px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: none;
      background-color: #2a2a2a;
      color: white;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #00c853;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-bottom: 10px;
    }

    button.secondary {
      background-color: #2a2a2a;
    }

    #qrcode {
      background: #fff;
      padding: 12px;
      border-radius: 8px;
      margin: 12px auto;
      width: fit-content;
    }

    .hidden { display: none; }
    .loading { text-align: center; padding: 40px; color: #616161; }
    .small { font-size: 12px; color: #616161; text-align: center; margin-top: 8px; }
  </style>
</head>
<body>

<div class="container">
  <div id="content" class="loading">Carregando...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<script type="module">
import { supabase } from './supabase.js'

const urlParams = new URLSearchParams(window.location.search)
const id = urlParams.get('id')
const content = document.getElementById('content')

if (!id) {
  content.innerHTML = 'Vaquinha não encontrada'
} else {
  carregar()
}

function gerarPayloadPix(chave, nome = 'Vaquinha', cidade = 'BRASIL', valor = null, id = '***') {
  const format = (id, value) => {
    const size = String(value).length.toString().padStart(2, '0')
    return `${id}${size}${value}`
  }
  let payload = '000201'
  payload += format('26', format('00', 'BR.GOV.BCB.PIX') + format('01', chave))
  payload += '52040000'
  payload += '5303986'
  if (valor) payload += format('54', parseFloat(valor).toFixed(2))
  payload += '5802BR'
  payload += format('59', nome.substring(0, 25))
  payload += format('60', cidade.substring(0, 15))
  payload += format('62', format('05', id.substring(0, 25)))
  payload += '6304'
  let crc = 0xFFFF
  for (let i = 0; i < payload.length; i++) {
    crc ^= payload.charCodeAt(i) << 8
    for (let j = 0; j < 8; j++) crc = crc & 0x8000 ? (crc << 1) ^ 0x1021 : crc << 1
  }
  crc = (crc & 0xFFFF).toString(16).toUpperCase().padStart(4, '0')
  return payload + crc
}

async function carregar() {
  const { data, error } = await supabase
    .from('campaigns')
    .select('*')
    .eq('id', id)
    .single()

  if (error || !data) {
    content.innerHTML = 'Vaquinha não encontrada'
    return
  }

  document.title = data.title
  const porcentagem = data.goal > 0 ? Math.min((data.current_amount / data.goal) * 100, 100) : 0

  content.innerHTML = `
    <h1>${data.title}</h1>
    <div class="desc">${data.description || ''}</div>
    
    <div class="progress-bar"><div class="progress" style="width: ${porcentagem}%"></div></div>
    <div class="values">
      <div><span class="green">R$ ${Number(data.current_amount || 0).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span><br>arrecadados</div>
      <div>Meta:<br><span class="green">R$ ${Number(data.goal).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span></div>
    </div>

    <div class="box">
      <input id="valor" type="number" placeholder="1,00" step="0.01" min="0.01">
      <button onclick="copiarPix('${data.pix_key}', '${data.title}')">Copiar PIX Copia e Cola</button>
      <button class="secondary" onclick="mostrarQR('${data.pix_key}', '${data.title}')">Gerar QR Code</button>
      <div id="qrcode" class="hidden"></div>
      <div class="small">O valor é opcional. Deixe vazio pra doar qualquer quantia.</div>
    </div>

    <button class="secondary" onclick="copiarLink()">🔗 Copiar link</button>
  `

  window.copiarPix = (chave, titulo) => {
    if (!chave) return alert('Essa vaquinha não tem chave PIX cadastrada')
    const valor = document.getElementById('valor').value
    const payload = gerarPayloadPix(chave, titulo.substring(0, 25), 'BRASIL', valor || null)
    navigator.clipboard.writeText(payload)
    alert('PIX Copia e Cola copiado! Cole no app do seu banco.')
  }

  window.copiarLink = () => {
    navigator.clipboard.writeText(window.location.href)
    alert('Link copiado!')
  }

  window.mostrarQR = (chave, titulo) => {
    if (!chave) return alert('Essa vaquinha não tem chave PIX')
    const valor = document.getElementById('valor').value
    const qrDiv = document.getElementById('qrcode')
    
    try {
      const payload = gerarPayloadPix(chave, titulo.substring(0, 25), 'BRASIL', valor || null)
      const qr = qrcode(0, 'M')
      qr.addData(payload)
      qr.make()
      qrDiv.innerHTML = qr.createImgTag(5, 6)
      qrDiv.classList.remove('hidden')
    } catch (e) {
      alert('Erro ao gerar QR Code')
    }
  }
}
</script>

</body>
</html>
