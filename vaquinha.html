<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vaquinha</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: #0a0a0a; color: #f1f1f1; font-family: 'Inter', sans-serif; }
    .header { padding: 20px 5%; background: #0f0f0f; border-bottom: 1px solid #1a1a1a; }
    .header a { color: #f1f1f1; text-decoration: none; font-weight: 700; font-size: 20px; }
    .container { max-width: 700px; margin: 0 auto; padding: 40px 20px; }
    .card { background: #121212; padding: 32px; border-radius: 16px; border: 1px solid #1f1f1f; }
    h1 { font-size: 28px; margin-bottom: 12px; }
    .desc { color: #9e9e9e; margin-bottom: 24px; line-height: 1.6; white-space: pre-wrap; }
    .progress-bar { background: #2a2a2a; height: 12px; border-radius: 6px; margin-bottom: 12px; }
    .progress { background: #00c853; height: 100%; border-radius: 6px; transition: width 0.5s; }
    .values { display: flex; justify-content: space-between; margin-bottom: 32px; }
    .values div { font-size: 14px; color: #9e9e9e; }
    .values b { color: #fff; font-size: 20px; display: block; }
    .pix-box { background: #1a1a1a; padding: 20px; border-radius: 12px; margin-bottom: 16px; }
    .pix-box label { font-size: 12px; color: #9e9e9e; display: block; margin-bottom: 8px; }
    .pix-box .key { font-size: 16px; font-weight: 600; word-break: break-all; margin-bottom: 12px; }
    input {
      width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 10px;
      border: 1px solid #2a2a2a; background-color: #0a0a0a; color: white; font-size: 16px;
    }
    button {
      width: 100%; padding: 14px; background: #00c853; color: #000; border: none;
      border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 10px;
    }
    button:hover { background: #00e676; }
    button.secondary { background: #2a2a2a; color: #fff; border: 1px solid #3a3a3a; }
    button.secondary:hover { background: #333; }
    .loading { text-align: center; padding: 60px; color: #616161; }
    #qrcode { background: #fff; padding: 16px; border-radius: 12px; margin: 16px auto; width: fit-content; }
    #qrcode img { display: block; }
    .hidden { display: none; }
    .alert { background: #4a1515; color: #ff5252; padding: 12px; border-radius: 8px; margin-bottom: 12px; text-align: center; }
  </style>
</head>
<body>

<header class="header">
  <a href="index.html">💰 Vaquinha Online</a>
</header>

<div class="container">
  <div id="content" class="loading">Carregando vaquinha...</div>
</div>

<!-- Importa biblioteca de QR Code -->
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<script type="module">
import { supabase } from './supabase.js'

const urlParams = new URLSearchParams(window.location.search)
const id = urlParams.get('id')
const content = document.getElementById('content')

if (!id) {
  content.innerHTML = '<div class="card">Vaquinha não encontrada</div>'
} else {
  carregarVaquinha()
}

// Função pra gerar payload PIX copia e cola
function gerarPayloadPix(chave, nome = 'Vaquinha Online', cidade = 'BRASIL', valor = null, id = '***') {
  const format = (id, value) => {
    const size = String(value).length.toString().padStart(2, '0')
    return `${id}${size}${value}`
  }

  let payload = '000201'
  payload += format('26', format('00', 'BR.GOV.BCB.PIX') + format('01', chave))
  payload += '52040000'
  payload += '5303986'
  if (valor) payload += format('54', parseFloat(valor).toFixed(2))
  payload += '5802BR'
  payload += format('59', nome.substring(0, 25))
  payload += format('60', cidade.substring(0, 15))
  payload += format('62', format('05', id.substring(0, 25)))
  payload += '6304'

  // CRC16
  let crc = 0xFFFF
  for (let i = 0; i < payload.length; i++) {
    crc ^= payload.charCodeAt(i) << 8
    for (let j = 0; j < 8; j++) {
      crc = crc & 0x8000 ? (crc << 1) ^ 0x1021 : crc << 1
    }
  }
  crc = (crc & 0xFFFF).toString(16).toUpperCase().padStart(4, '0')
  return payload + crc
}

async function carregarVaquinha() {
  const { data, error } = await supabase
    .from('campaigns')
    .select('*')
    .eq('id', id)
    .single()

  if (error || !data) {
    content.innerHTML = '<div class="card">Vaquinha não encontrada</div>'
    return
  }

  document.title = data.title + ' - Vaquinha Online'
  const porcentagem = data.goal > 0 ? Math.min((data.current_amount / data.goal) * 100, 100) : 0
  const link = window.location.href

  content.innerHTML = `
    <div class="card">
      <h1>${data.title}</h1>
      <p class="desc">${data.description || 'Sem descrição'}</p>
      
      <div class="progress-bar"><div class="progress" style="width: ${porcentagem}%"></div></div>
      <div class="values">
        <div>Arrecadado<b>R$ ${Number(data.current_amount || 0).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</b></div>
        <div>Meta<b>R$ ${Number(data.goal).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</b></div>
      </div>

      <div class="pix-box">
        <label>Chave PIX para doação</label>
        <div class="key">${data.pix_key || 'Não informada'}</div>
        <button onclick="copiarPix('${data.pix_key}')">Copiar chave PIX</button>
        
        <label style="margin-top: 16px;">Ou gere um QR Code com valor</label>
        <input id="valor-doacao" type="number" placeholder="Valor da doação (opcional)" step="0.01" min="0.01">
        <div id="alerta-qr" class="alert hidden"></div>
        <button onclick="gerarQRCode('${data.pix_key}', '${data.title}')">Gerar QR Code PIX</button>
        <div id="qrcode" class="hidden"></div>
      </div>

      <button class="secondary" onclick="copiarLink()">🔗 Copiar link da vaquinha</button>
    </div>
  `

  window.copiarPix = (chave) => {
    navigator.clipboard.writeText(chave)
    alert('Chave PIX copiada!')
  }

  window.copiarLink = () => {
    navigator.clipboard.writeText(link)
    alert('Link copiado! Compartilhe com seus amigos')
  }

  window.gerarQRCode = (chave, titulo) => {
    const valor = document.getElementById('valor-doacao').value
    const alerta = document.getElementById('alerta-qr')
    const qrDiv = document.getElementById('qrcode')
    
    alerta.classList.add('hidden')
    qrDiv.classList.add('hidden')
    qrDiv.innerHTML = ''

    if (!chave) {
      alerta.textContent = 'Essa vaquinha não tem chave PIX cadastrada'
      alerta.classList.remove('hidden')
      return
    }

    try {
      const payload = gerarPayloadPix(chave, titulo.substring(0, 25), 'BRASIL', valor || null)
      const qr = qrcode(0, 'M')
      qr.addData(payload)
      qr.make()
      qrDiv.innerHTML = qr.createImgTag(6, 8)
      qrDiv.classList.remove('hidden')
    } catch (e) {
      alerta.textContent = 'Erro ao gerar QR Code: ' + e.message
      alerta.classList.remove('hidden')
    }
  }
}
</script>

</body>
</html>
