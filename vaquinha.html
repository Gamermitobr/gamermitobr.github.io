<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vaquinha</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #f1f1f1; font-family: 'Inter', sans-serif; }
    .container { max-width: 800px; margin: 40px auto; padding: 20px; }
    .card { background: #121212; border: 1px solid #1f1f1f; border-radius: 16px; padding: 32px; margin-bottom: 24px; }
    h1 { font-size: 28px; margin-bottom: 8px; }
    .descricao { color: #9e9e9e; margin-bottom: 24px; line-height: 1.6; }
    .progress-bar { background: #2a2a2a; height: 12px; border-radius: 6px; margin: 20px 0; }
    .progress { background: #00c853; height: 100%; border-radius: 6px; transition: width 0.5s; }
    .values { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 18px; }
    .values b { color: #00c853; }
    .doacao-box { background: #0f0f0f; border: 1px solid #1f1f1f; border-radius: 16px; padding: 24px; }
    .doacao-box h3 { margin-bottom: 16px; }
    input[type="number"] {
      width: 100%; padding: 14px; background: #121212; border: 1px solid #2a2a2a;
      color: #f1f1f1; border-radius: 8px; font-size: 16px; margin-bottom: 12px;
    }
    button {
      width: 100%; padding: 14px; background: #00c853; color: #000; border: none;
      border-radius: 10px; font-weight: 700; font-size: 16px; cursor: pointer; margin-bottom: 12px;
    }
    button:hover { background: #00e676; }
    button.secondary { background: #2a2a2a; color: #f1f1f1; }
    #area-pix { text-align: center; }
    #qr-code-img { border-radius: 12px; border: 1px solid #1f1f1f; margin: 16px 0; }
    textarea {
      width: 100%; padding: 12px; background: #0a0a0a; border: 1px solid #2a2a2a;
      color: #f1f1f1; border-radius: 8px; font-family: monospace; font-size: 12px; resize: none;
    }
    .aviso { color: #9e9e9e; font-size: 13px; margin-top: 12px; line-height: 1.5; }
    .dono-area { background: #1a0f0f; border: 1px solid #3a1a1a; border-radius: 12px; padding: 20px; margin-top: 24px; }
    .hidden { display: none; }
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <h1 id="titulo-vaquinha">Carregando...</h1>
    <p class="descricao" id="descricao-vaquinha"></p>
    
    <div class="values">
      <span><b id="valor-arrecadado">R$ 0,00</b> arrecadados</span>
      <span>Meta: <b id="valor-meta">R$ 0,00</b></span>
    </div>
    <div class="progress-bar"><div class="progress" id="barra-progresso" style="width: 0%"></div></div>
    <div style="text-align: right; color: #00c853; font-weight: 600;" id="porcentagem">0% concluído</div>
  </div>

  <div class="doacao-box">
    <h3>💚 Ajude essa vaquinha</h3>
    <p style="margin-bottom: 16px;">Beneficiário: <b id="nome-beneficiario">-</b></p>
    
    <input type="number" id="valor-doacao" placeholder="Valor da doação R$" step="0.01" min="1">
    <button onclick="gerarQrCode()">Gerar QR Code Pix</button>

    <div id="area-pix" class="hidden">
      <img id="qr-code-img" width="280">
      <textarea id="pix-copia-cola" readonly rows="4"></textarea>
      <button class="secondary" onclick="copiarPix()">Copiar Pix Copia e Cola</button>
      <p class="aviso">
        O valor vai direto pra conta de <b id="nome-aviso"></b>. 
        Após pagar, avise o criador pra ele atualizar o total arrecadado aqui no site.
      </p>
    </div>
  </div>

  <div id="dono-area" class="dono-area hidden">
    <h3>⚙️ Painel do criador</h3>
    <p style="color: #9e9e9e; margin-bottom: 12px;">Atualize o valor total quando receber doações</p>
    <input type="number" id="novo-valor" placeholder="Novo valor total R$" step="0.01">
    <button onclick="atualizarValor()">Atualizar valor arrecadado</button>
  </div>
</div>

<script type="module">
import { supabase } from './supabase.js'
import { QrCodePix } from 'https://cdn.jsdelivr.net/npm/pix-qrcode@1.0.0/+esm'
import QRCode from 'https://cdn.jsdelivr.net/npm/qrcode@1.5.3/+esm'

const urlParams = new URLSearchParams(window.location.search)
const id = urlParams.get('id')
let dadosVaquinha = null

const { data: v, error } = await supabase.from('campaigns').select('*').eq('id', id).single()
if (error || !v) {
  document.body.innerHTML = '<div style="text-align:center;padding:60px;">Vaquinha não encontrada</div>'
  throw new Error('Vaquinha não encontrada')
}

dadosVaquinha = v
const pix = v.metadata || {}

// Preenche dados
document.title = v.title + ' - Vaquinha Online'
document.getElementById('titulo-vaquinha').textContent = v.title
document.getElementById('descricao-vaquinha').textContent = v.description || 'Sem descrição'
document.getElementById('valor-arrecadado').textContent = Number(v.current_amount).toLocaleString('pt-BR', {style:'currency',currency:'BRL'})
document.getElementById('valor-meta').textContent = Number(v.goal).toLocaleString('pt-BR', {style:'currency',currency:'BRL'})

const pct = v.goal > 0 ? Math.min((v.current_amount / v.goal) * 100, 100) : 0
document.getElementById('barra-progresso').style.width = pct + '%'
document.getElementById('porcentagem').textContent = pct.toFixed(1) + '% concluído'

document.getElementById('nome-beneficiario').textContent = pix.beneficiary_name || 'Não informado'
document.getElementById('nome-aviso').textContent = pix.beneficiary_name || 'o criador'

// Mostra painel do dono se for ele
const { data: { user } } = await supabase.auth.getUser()
if (user && user.id === v.user_id) {
  document.getElementById('dono-area').classList.remove('hidden')
  document.getElementById('novo-valor').value = v.current_amount
}

window.gerarQrCode = async function() {
  const valor = parseFloat(document.getElementById('valor-doacao').value)
  if (!valor || valor <= 0) return alert('Digite um valor válido')
  if (!pix.pix_key) return alert('Criador não configurou chave Pix')

  const qrCodePix = QrCodePix({
    version: '01',
    key: pix.pix_key,
    name: pix.beneficiary_name.substring(0, 25),
    city: pix.beneficiary_city.substring(0, 15),
    transactionId: `VQ${v.id.substring(0, 10)}`,
    message: `Doacao ${v.title}`.substring(0, 40),
    value: valor
  })

  const payload = qrCodePix.payload()
  const qrCodeURL = await QRCode.toDataURL(payload, { width: 280, margin: 1 })

  document.getElementById('qr-code-img').src = qrCodeURL
  document.getElementById('pix-copia-cola').value = payload
  document.getElementById('area-pix').classList.remove('hidden')
}

window.copiarPix = function() {
  navigator.clipboard.writeText(document.getElementById('pix-copia-cola').value)
  alert('Código Pix copiado!')
}

window.atualizarValor = async function() {
  const novoValor = parseFloat(document.getElementById('novo-valor').value)
  if (isNaN(novoValor) || novoValor < 0) return alert('Valor inválido')
  
  const { error } = await supabase.from('campaigns')
    .update({ current_amount: novoValor })
    .eq('id', id)
  
  if (error) alert('Erro: ' + error.message)
  else {
    alert('Valor atualizado!')
    location.reload()
  }
}
</script>
</body>
</html>
