<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vaquinha Online</title>
  <style>
    body { background: #0a0a0a; color: #f1f1f1; font-family: 'Inter', sans-serif; padding: 20px; }
    .card { background: #121212; border: 1px solid #1f1f1f; border-radius: 20px; padding: 24px; margin: 20px 0; }
    .erro { background: #2a0a0a; border: 1px solid #ff5252; color: #ff8a80; padding: 16px; border-radius: 12px; white-space: pre-wrap; word-break: break-word; }
    .loading { text-align: center; padding: 40px; color: #9e9e9e; }
    h1 { font-size: 24px; margin-bottom: 12px; }
    b { color: #00c853; }
  </style>
</head>
<body>

<div id="loading" class="loading">Carregando vaquinha...</div>
<div id="erro" class="erro" style="display:none;"></div>
<div id="conteudo" style="display:none;"></div>

<script type="module">
import { supabase } from './supabase.js'

function mostrarErro(titulo, detalhe) {
  document.getElementById('loading').style.display = 'none'
  document.getElementById('erro').style.display = 'block'
  document.getElementById('erro').innerHTML = `<b>${titulo}</b>\n\n${detalhe}`
}

try {
  const urlParams = new URLSearchParams(window.location.search)
  const id = urlParams.get('id')

  if (!id) {
    mostrarErro('Link inválido', 'Não achei o ID da vaquinha na URL. Deve ser algo tipo ?id=abc123')
    throw new Error('Sem ID')
  }

  const { data: v, error } = await supabase
    .from('campaigns')
    .select('*')
    .eq('id', id)
    .single()

  if (error) {
    mostrarErro('Erro do Supabase', JSON.stringify(error, null, 2))
    throw error
  }
  
  if (!v) {
    mostrarErro('Vaquinha não encontrada', 'O banco retornou vazio. Confere se o ID existe e se o status é active.')
    throw new Error('Não encontrada')
  }

  // Se chegou aqui, deu certo
  document.getElementById('loading').style.display = 'none'
  document.getElementById('conteudo').style.display = 'block'
  document.getElementById('conteudo').innerHTML = `
    <div class="card">
      <h1>${v.title}</h1>
      <p>${v.description || 'Sem descrição'}</p>
      <p>Meta: <b>R$ ${Number(v.goal).toLocaleString('pt-BR')}</b></p>
      <p>Arrecadado: <b>R$ ${Number(v.current_amount).toLocaleString('pt-BR')}</b></p>
      <p>Status: <b>${v.status}</b></p>
    </div>
  `

} catch (e) {
  console.error(e)
  if (!document.getElementById('erro').style.display.includes('block')) {
    mostrarErro('Erro desconhecido', e.message || e.toString())
  }
}
</script>

</body>
</html>
