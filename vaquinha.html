<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vaquinha</title>
  <style>
    body {
      background-color: #000000;
      color: #a0a0a0;
      font-family: Arial, sans-serif;
      padding: 0;
      margin: 0;
      text-align: center;
    }

    .header {
      padding: 20px;
      border-bottom: 1px solid #1a1a1a;
      margin-bottom: 30px;
    }

    .header h2 {
      color: #ffffff;
      font-size: 20px;
      margin: 0;
      font-weight: 700;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 0 20px 40px 20px;
    }

    h1 {
      font-size: 22px;
      color: #a0a0a0;
      margin-bottom: 20px;
      font-weight: normal;
      line-height: 1.4;
    }

    .desc {
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 40px;
      white-space: pre-wrap;
    }

    .progress-bar {
      background: #2a2a2a;
      height: 4px;
      border-radius: 2px;
      margin-bottom: 12px;
    }

    .progress {
      background: #00c853;
      height: 100%;
      border-radius: 2px;
    }

    .values {
      display: flex;
      justify-content: space-between;
      margin-bottom: 40px;
      font-size: 14px;
    }

    .values .green {
      color: #00c853;
      font-weight: bold;
    }

    .values .label {
      color: #616161;
      font-size: 12px;
    }

    .box {
      background-color: #1a1a1a;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 16px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 2px solid #00c853;
      background-color: #2a2a2a;
      color: white;
      font-size: 16px;
      text-align: left;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 14px;
      background-color: #00c853;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }

    .box-link {
      background-color: #1a1a1a;
      padding: 20px;
      border-radius: 12px;
      margin-top: 16px;
    }

    button.secondary {
      background-color: #2a2a2a;
      color: #a0a0a0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .hidden { display: none; }
    .loading { padding: 40px; }
  </style>
</head>
<body>

<div class="header">
  <h2>💰 Vaquinha Online</h2>
</div>

<div class="container">
  <div id="content" class="loading">Carregando...</div>
</div>

<script type="module">
import { supabase } from './supabase.js'

const urlParams = new URLSearchParams(window.location.search)
const id = urlParams.get('id')
const content = document.getElementById('content')

// CHAVE PIX FIXA - CELULAR
const CHAVE_PIX_FIXA = '+5538991464508'

if (!id) {
  content.innerHTML = 'Vaquinha não encontrada'
} else {
  carregar()
}

function gerarPayloadPix(chave, valor = null) {
  chave = String(chave || '').replace(/\s/g, '')
  if (!chave) throw new Error('Chave PIX vazia')

  const format = (id, value) => {
    value = String(value)
    const size = String(value.length).padStart(2, '0')
    return `${id}${size}${value}`
  }

  const gui = format('00', 'BR.GOV.BCB.PIX')
  const chavePix = format('01', chave)
  const infoAdicional = gui + chavePix
  const merchantAccount = format('26', infoAdicional)

  let payload = '000201'
  payload += merchantAccount
  payload += '52040000'
  payload += '5303986'
  
  const valorNum = parseFloat(valor)
  if (valor && !isNaN(valorNum) && valorNum > 0) {
    payload += format('54', valorNum.toFixed(2))
  }
  
  payload += '5802BR'
  payload += format('59', 'VAQUINHA ONLINE')
  payload += format('60', 'BRASIL')
  
  const txid = format('05', '***')
  payload += format('62', txid)
  
  payload += '6304'

  let crc = 0xFFFF
  const polinomio = 0x1021
  for (let i = 0; i < payload.length; i++) {
    crc ^= payload.charCodeAt(i) << 8
    for (let j = 0; j < 8; j++) {
      crc = (crc & 0x8000) ? (crc << 1) ^ polinomio : crc << 1
      crc &= 0xFFFF
    }
  }
  
  const crcHex = crc.toString(16).toUpperCase().padStart(4, '0')
  return payload + crcHex
}

async function carregar() {
  const { data, error } = await supabase
    .from('campaigns')
    .select('*')
    .eq('id', id)
    .single()

  if (error || !data) {
    content.innerHTML = 'Vaquinha não encontrada'
    return
  }

  document.title = data.title + ' - Vaquinha Online'
  const porcentagem = data.goal > 0 ? Math.min((data.current_amount / data.goal) * 100, 100) : 0

  content.innerHTML = `
    <h1>${data.title}</h1>
    <div class="desc">${data.description || ''}</div>
    
    <div class="progress-bar"><div class="progress" style="width: ${porcentagem}%"></div></div>
    <div class="values">
      <div>
        <div class="green">R$ ${Number(data.current_amount || 0).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div>
        <div class="label">arrecadados</div>
      </div>
      <div style="text-align: right;">
        <div class="label">Meta:</div>
        <div class="green">R$ ${Number(data.goal).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div>
      </div>
    </div>

    <div class="box">
      <input id="valor" type="number" placeholder="1,00" step="0.01" min="0.01" value="1,00">
      <button onclick="copiarPix()">Copiar PIX Copia e Cola</button>
    </div>

    <div class="box-link">
      <button class="secondary" onclick="copiarLink()">🔗 Copiar link</button>
    </div>
  `

  window.copiarPix = () => {
    const valor = document.getElementById('valor').value
    try {
      const payload = gerarPayloadPix(CHAVE_PIX_FIXA, valor || null)
      navigator.clipboard.writeText(payload)
      alert('PIX Copia e Cola copiado! Cole no app do seu banco.')
    } catch (e) {
      alert('Erro ao gerar PIX: ' + e.message)
    }
  }

  window.copiarLink = () => {
    navigator.clipboard.writeText(window.location.href)
    alert('Link copiado!')
  }
}
</script>

</body>
</html>
