<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vaquinha Online</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #f1f1f1; font-family: 'Inter', sans-serif; }
    .header { text-align: center; padding: 24px 20px; background: #0f0f0f; border-bottom: 1px solid #1a1a1a; }
    .header h1 { font-size: 22px; font-weight: 700; }
    .container { max-width: 500px; margin: 40px auto; padding: 0 20px; }
    .card { background: #121212; border: 1px solid #1f1f1f; border-radius: 16px; padding: 32px; margin-bottom: 20px; text-align: center; }
    h2 { margin-bottom: 8px; font-size: 24px; }
    .subtitle { color: #9e9e9e; margin-bottom: 24px; font-size: 14px; }
    .progress-bar { background: #2a2a2a; height: 10px; border-radius: 5px; margin: 24px 0 12px; overflow: hidden; }
    .progress { background: #00c853; height: 100%; border-radius: 5px; transition: width 0.5s; }
    .values { display: flex; justify-content: space-between; font-size: 15px; margin-bottom: 24px; }
    .values b { color: #00c853; }
    .descricao { color: #9e9e9e; font-size: 15px; line-height: 1.6; margin-bottom: 24px; text-align: left; }
    .form-group { margin-bottom: 20px; text-align: left; }
    label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; }
    input {
      width: 100%; padding: 14px; background: #0a0a0a; border: 1px solid #2a2a2a;
      color: #f1f1f1; border-radius: 8px; font-family: inherit; font-size: 16px;
    }
    input:focus { outline: 2px solid #00c853; outline-offset: 2px; border-color: #00c853; }
    button {
      width: 100%; padding: 16px; background: #00c853; color: #000; border: none;
      border-radius: 10px; font-weight: 700; font-size: 16px; cursor: pointer; transition: all 0.2s;
    }
    button:hover { background: #00e676; transform: translateY(-1px); }
    button:disabled { background: #333; color: #666; cursor: not-allowed; }
    .qr-area { margin-top: 24px; display: none; }
    .qr-area img { max-width: 250px; margin: 16px auto; border: 8px solid #fff; border-radius: 12px; }
    .pix-code {
      background: #0a0a0a; border: 1px solid #2a2a2a; border-radius: 8px;
      padding: 12px; font-size: 12px; word-break: break-all; color: #9e9e9e; margin: 16px 0;
    }
    .btn-sec { background: #2a2a2a; color: #f1f1f1; margin-top: 12px; }
    .btn-sec:hover { background: #333; }
    .loading { text-align: center; padding: 60px; color: #616161; }
    .erro { text-align: center; padding: 60px; color: #ff5252; }
    .beneficiario { font-weight: 700; color: #f1f1f1; }
  </style>
</head>
<body>

<div class="header">
  <h1>💰 Vaquinha Online</h1>
</div>

<div class="container">
  <div id="loading" class="loading">Carregando...</div>
  <div id="erro" class="erro" style="display:none;"></div>
  
  <div id="conteudo" style="display:none;">
    <div class="card">
      <h2 id="titulo"></h2>
      <p class="subtitle" id="criado-por"></p>
      
      <div class="descricao" id="descricao"></div>
      
      <div class="progress-bar">
        <div class="progress" id="progress"></div>
      </div>
      <div class="values">
        <span><b id="arrecadado">R$ 0,00</b> arrecadados</span>
        <span>Meta: <b id="meta">R$ 0,00</b></span>
      </div>
    </div>

    <div class="card">
      <h2>💳 Faça sua doação</h2>
      <p class="subtitle">O valor vai direto pra conta de <span class="beneficiario" id="beneficiario"></span></p>
      
      <div class="form-group">
        <label for="valor">Valor da doação R$</label>
        <input type="text" id="valor" placeholder="50,00" inputmode="decimal">
      </div>

      <button onclick="gerarPix()">Gerar QR Code Pix</button>

      <div class="qr-area" id="qr-area">
        <img id="qr-img" alt="QR Code Pix">
        <div class="pix-code" id="pix-code"></div>
        <button class="btn-sec" onclick="copiarPix()">📋 Copiar código Pix</button>
        <button class="btn-sec" onclick="compartilharWhatsApp()">📱 Compartilhar no WhatsApp</button>
      </div>
    </div>

    <div class="card" style="text-align: center;">
      <button class="btn-sec" onclick="copiarLink()">🔗 Copiar link</button>
      <p style="margin-top: 20px; color: #616161; font-size: 13px;">
        Feito com 💚 no Vaquinha Online
      </p>
    </div>
  </div>
</div>

<!-- Importa a lib correta do Pix -->
<script src="https://cdn.jsdelivr.net/npm/qrcode-pix@3.0.0/dist/qrcode-pix.min.js"></script>
<script type="module">
import { supabase } from './supabase.js'

const urlParams = new URLSearchParams(window.location.search)
const id = urlParams.get('id')

if (!id) {
  mostrarErro('Link inválido')
  throw new Error('ID não informado')
}

let vaquinha = null
let pixCode = ''

function formatarMoeda(input) {
  let valor = input.value.replace(/\D/g, '')
  if (!valor) {
    input.value = ''
    return
  }
  valor = (parseInt(valor) / 100).toFixed(2)
  valor = valor.replace('.', ',')
  valor = valor.replace(/\B(?=(\d{3})+(?!\d))/g, '.')
  input.value = valor
}

function desformatarMoeda(valor) {
  return Number(valor.replace(/\./g, '').replace(',', '.')) || 0
}

document.getElementById('valor').addEventListener('input', (e) => formatarMoeda(e.target))

const { data: v, error } = await supabase
  .from('campaigns')
  .select('*')
  .eq('id', id)
  .single()

if (error || !v) {
  mostrarErro('Vaquinha não encontrada')
  throw new Error('Não encontrada')
}

if (v.status !== 'active') {
  mostrarErro('Esta vaquinha foi encerrada e não aceita mais doações.')
  throw new Error('Vaquinha encerrada')
}

vaquinha = v

document.getElementById('loading').style.display = 'none'
document.getElementById('conteudo').style.display = 'block'

document.getElementById('titulo').textContent = v.title
document.getElementById('descricao').textContent = v.description || 'Sem descrição'
document.getElementById('beneficiario').textContent = v.metadata?.beneficiary_name || 'Beneficiário'

const pct = v.goal > 0 ? Math.min((v.current_amount / v.goal) * 100, 100) : 0
document.getElementById('progress').style.width = pct + '%'
document.getElementById('arrecadado').textContent = Number(v.current_amount).toLocaleString('pt-BR', {style:'currency',currency:'BRL'})
document.getElementById('meta').textContent = Number(v.goal).toLocaleString('pt-BR', {style:'currency',currency:'BRL'})

window.gerarPix = async function() {
  const valor = desformatarMoeda(document.getElementById('valor').value)
  
  if (valor < 1) {
    alert('Valor mínimo é R$ 1,00')
    return
  }

  try {
    const meta = vaquinha.metadata
    
    if (!meta?.pix_key || !meta?.beneficiary_name || !meta?.beneficiary_city) {
      alert('Esta vaquinha não tem dados de Pix configurados')
      return
    }

    // Usa a lib QrCodePix correta
    const qr = QrCodePix({
      version: '01',
      key: meta.pix_key,
      name: meta.beneficiary_name.substring(0, 25),
      city: meta.beneficiary_city.substring(0, 15),
      transactionId: '***',
      message: vaquinha.title.substring(0, 50),
      value: valor
    })

    pixCode = qr.payload()
    const qrImg = await qr.base64()
    
    document.getElementById('qr-img').src = qrImg
    document.getElementById('pix-code').textContent = pixCode
    document.getElementById('qr-area').style.display = 'block'
    
  } catch (err) {
    alert('Erro ao gerar QR Code: ' + err.message)
    console.error(err)
  }
}

window.copiarPix = function() {
  navigator.clipboard.writeText(pixCode)
  alert('Código Pix copiado!')
}

window.copiarLink = function() {
  navigator.clipboard.writeText(window.location.href)
  alert('Link copiado!')
}

window.compartilharWhatsApp = function() {
  const texto = `Ajude na vaquinha: ${vaquinha.title}\n\n${window.location.href}`
  window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`, '_blank')
}

function mostrarErro(msg) {
  document.getElementById('loading').style.display = 'none'
  document.getElementById('erro').style.display = 'block'
  document.getElementById('erro').textContent = msg
}
</script>

</body>
</html>
