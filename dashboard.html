<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Vaquinha Online</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --bg-elevated: #121212;
      --bg-header: #0f0f0f;
      --border: #1f1f1f;
      --text: #f1f1f1;
      --text-muted: #9e9e9e;
      --primary: #00c853;
      --primary-hover: #00e676;
      --danger: #ff5252;
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.6; }
    .header {
      display: flex; justify-content: space-between; align-items: center; padding: 16px 5%;
      background: var(--bg-header); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10;
    }
    .header h1 { font-size: 20px; font-weight: 700; }
    .user-area { display: flex; align-items: center; gap: 16px; }
    .user-email { color: var(--text-muted); font-size: 14px; }
    .btn-logout {
      background: #2a2a2a; border: 1px solid #3a3a3a; color: var(--text);
      padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; font-family: inherit;
    }
    .btn-logout:hover { background: #333; }
    .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; flex-wrap: wrap; gap: 16px; }
    .top-bar h2 { font-size: 28px; }
    .btn-main {
      background: var(--primary); color: #000; border: none; padding: 12px 24px;
      border-radius: 10px; font-weight: 700; font-size: 15px; cursor: pointer;
      text-decoration: none; display: inline-block; transition: all 0.2s; font-family: inherit;
    }
    .btn-main:hover { background: var(--primary-hover); transform: translateY(-1px); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
    .card {
      background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 24px; transition: all 0.2s; display: flex; flex-direction: column;
    }
    .card:hover { border-color: #333; transform: translateY(-2px); }
    .card-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 12px; }
    .card h3 { font-size: 18px; word-break: break-word; flex: 1; }
    .status {
      font-size: 11px; padding: 4px 8px; border-radius: 4px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .status.active { background: #0a2a1a; color: var(--primary); }
    .status.closed { background: #2a1a0a; color: #ffa726; }
    .card .descricao { color: var(--text-muted); font-size: 14px; margin-bottom: 16px; flex-grow: 1; line-height: 1.5; }
    .progress-bar { background: #2a2a2a; height: 8px; border-radius: 4px; margin: 16px 0 8px; overflow: hidden; }
    .progress { background: var(--primary); height: 100%; border-radius: 4px; transition: width 0.5s; }
    .values { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 16px; }
    .values b { color: var(--primary); }
    .card-actions { display: flex; gap: 8px; margin-top: auto; }
    .card-actions a {
      flex: 1; text-align: center; padding: 10px; background: #2a2a2a; border-radius: 8px;
      color: var(--text); text-decoration: none; font-size: 14px; font-weight: 600; transition: all 0.2s;
    }
    .card-actions a:hover { background: #333; }
    .card-actions a.primary { background: var(--primary); color: #000; }
    .card-actions a.primary:hover { background: var(--primary-hover); }
    .empty-state { text-align: center; padding: 80px 20px; color: var(--text-muted); grid-column: 1 / -1; }
    .empty-state h3 { font-size: 20px; margin-bottom: 8px; color: var(--text); }
    .loading { text-align: center; padding: 80px 20px; color: var(--text-muted); grid-column: 1 / -1; }
    .erro-box {
      background: #2a0a0a; border: 1px solid #5a1a1a; color: #ff6e6e;
      padding: 16px; border-radius: 8px; margin-bottom: 20px; display: none;
    }
    @media (max-width: 640px) {
      .user-email { display: none; }
      .grid { grid-template-columns: 1fr; }
      .top-bar h2 { font-size: 24px; }
    }
  </style>
</head>
<body>

<header class="header">
  <h1>💰 Vaquinha Online</h1>
  <div class="user-area">
    <span class="user-email" id="user-email"></span>
    <button class="btn-logout" onclick="logout()">Sair</button>
  </div>
</header>

<div class="container">
  <div id="erro-box" class="erro-box"></div>
  
  <div class="top-bar">
    <h2>Minhas Vaquinhas</h2>
    <button class="btn-main" onclick="irParaCriar()">+ Criar nova vaquinha</button>
  </div>

  <div class="grid" id="lista-vaquinhas">
    <div class="loading">Carregando suas vaquinhas...</div>
  </div>
</div>

<script type="module">
import { supabase } from './supabase.js'

const erroBox = document.getElementById('erro-box')
const lista = document.getElementById('lista-vaquinhas')

function mostrarErro(msg) {
  erroBox.textContent = msg
  erroBox.style.display = 'block'
  console.error(msg)
}

window.irParaCriar = function() {
  window.location.href = 'create.html'
}

window.logout = async function() {
  await supabase.auth.signOut()
  window.location.href = 'index.html'
}

window.copiarLink = function(id) {
  const url = `${window.location.origin}/vaquinha.html?id=${id}`
  navigator.clipboard.writeText(url)
  alert('Link copiado!')
}

async function init() {
  try {
    const { data: { user }, error: authError } = await supabase.auth.getUser()
    
    if (authError) throw authError
    if (!user) {
      window.location.href = 'index.html'
      return
    }

    document.getElementById('user-email').textContent = user.email

    const { data: vaquinhas, error } = await supabase
      .from('campaigns')
      .select('*')
      .eq('user_id', user.id)
      .eq('status', 'active')
      .order('created_at', { ascending: false })

    if (error) throw error

    if (!vaquinhas || vaquinhas.length === 0) {
      lista.innerHTML = `
        <div class="empty-state">
          <h3>Você não tem vaquinhas ativas</h3>
          <p>Clique no botão acima para criar uma nova</p>
        </div>
      `
    } else {
      lista.innerHTML = vaquinhas.map(v => {
        const pct = v.goal > 0 ? Math.min((v.current_amount / v.goal) * 100, 100) : 0
        
        return `
          <div class="card">
            <div class="card-header">
              <h3>${v.title}</h3>
              <span class="status active">Ativa</span>
            </div>
            <p class="descricao">${v.description || 'Sem descrição'}</p>
            <div class="progress-bar">
              <div class="progress" style="width: ${pct}%"></div>
            </div>
            <div class="values">
              <span><b>${Number(v.current_amount).toLocaleString('pt-BR', {style:'currency',currency:'BRL'})}</b> arrecadados</span>
              <span>Meta: <b>${Number(v.goal).toLocaleString('pt-BR', {style:'currency',currency:'BRL'})}</b></span>
            </div>
            <div class="card-actions">
              <a href="vaquinha.html?id=${v.id}">Ver página</a>
              <a href="editar-vaquinha.html?id=${v.id}" class="primary">Editar</a>
            </div>
          </div>
        `
      }).join('')
    }

  } catch (err) {
    mostrarErro('Erro ao carregar dashboard: ' + err.message)
    lista.innerHTML = `<div class="loading" style="color: #ff5252;">Erro ao carregar. Veja mensagem acima.</div>`
  }
}

init()
</script>

</body>
</html>
