<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Login</h1>

<div class="card">

  <input type="email" id="email" placeholder="Email" class="input"><br><br>
  <input type="password" id="password" placeholder="Senha" class="input"><br><br>

  <button id="signup">Criar conta</button>
  <button id="login">Entrar</button>

  <p id="msg"></p>

</div>

<script type="module">
import { supabase } from './supabase.js'

const msg = document.getElementById('msg')

document.getElementById('signup').onclick = async () => {
  const email = email.value
  const password = password.value

  const { error } = await supabase.auth.signUp({ email, password })

  msg.innerText = error ? error.message : "Conta criada!"
}

document.getElementById('login').onclick = async () => {
  const email = email.value
  const password = password.value

  const { error } = await supabase.auth.signInWithPassword({ email, password })

  if (error) {
    msg.innerText = error.message
  } else {
    window.location.href = "index.html"
  }
}
</script>

</body>
</html>
