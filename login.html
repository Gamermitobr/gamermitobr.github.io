<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar - Vaquinha Online</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #0a0a0a; color: #f1f1f1; font-family: 'Inter', sans-serif;
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
    }
    .box {
      background: #121212; padding: 32px; border-radius: 16px;
      border: 1px solid #1f1f1f; width: 100%; max-width: 400px;
    }
    h1 { text-align: center; margin-bottom: 24px; font-size: 24px; }
    input {
      width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 10px;
      border: 1px solid #2a2a2a; background-color: #1a1a1a; color: white; font-size: 16px;
    }
    button {
      width: 100%; padding: 14px; background: #00c853; color: #000; border: none;
      border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px;
    }
    .toggle { text-align: center; margin-top: 20px; font-size: 14px; color: #9e9e9e; }
    .toggle a { color: #00c853; cursor: pointer; text-decoration: none; }
    .alert { background: #4a1515; color: #ff5252; padding: 12px; border-radius: 8px; margin-bottom: 12px; text-align: center; }
    .hidden { display: none; }
  </style>
</head>
<body>

<div class="box">
  <div id="login-form">
    <h1>Entrar na conta</h1>
    <div id="login-erro" class="alert hidden"></div>
    <input type="email" id="login-email" placeholder="Seu email">
    <input type="password" id="login-senha" placeholder="Sua senha">
    <button onclick="entrar()">Entrar</button>
    <div class="toggle">Não tem conta? <a onclick="mostrarCadastro()">Cadastre-se</a></div>
  </div>

  <div id="cadastro-form" class="hidden">
    <h1>Criar conta</h1>
    <div id="cadastro-erro" class="alert hidden"></div>
    <input type="email" id="cadastro-email" placeholder="Seu email">
    <input type="password" id="cadastro-senha" placeholder="Crie uma senha">
    <button onclick="cadastrar()">Criar conta</button>
    <div class="toggle">Já tem conta? <a onclick="mostrarLogin()">Fazer login</a></div>
  </div>
</div>

<script type="module">
import { supabase } from './supabase.js'

// Se já tá logado, manda pro dashboard
const { data: { user } } = await supabase.auth.getUser()
if (user) window.location.href = 'dashboard.html'

const loginForm = document.getElementById('login-form')
const cadastroForm = document.getElementById('cadastro-form')
const loginErro = document.getElementById('login-erro')
const cadastroErro = document.getElementById('cadastro-erro')

window.mostrarCadastro = () => {
  loginForm.classList.add('hidden')
  cadastroForm.classList.remove('hidden')
}
window.mostrarLogin = () => {
  cadastroForm.classList.add('hidden')
  loginForm.classList.remove('hidden')
}

window.entrar = async function() {
  loginErro.classList.add('hidden')
  const { error } = await supabase.auth.signInWithPassword({
    email: document.getElementById('login-email').value,
    password: document.getElementById('login-senha').value
  })
  if (error) {
    loginErro.textContent = error.message
    loginErro.classList.remove('hidden')
  } else {
    window.location.href = 'dashboard.html'
  }
}

window.cadastrar = async function() {
  cadastroErro.classList.add('hidden')
  const { error } = await supabase.auth.signUp({
    email: document.getElementById('cadastro-email').value,
    password: document.getElementById('cadastro-senha').value
  })
  if (error) {
    cadastroErro.textContent = error.message
    cadastroErro.classList.remove('hidden')
  } else {
    alert('Conta criada! Verifique seu email pra confirmar e depois faça login.')
    mostrarLogin()
  }
}
</script>

</body>
</html>
