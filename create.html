<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Vaquinha - Vaquinha Online</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #f1f1f1; font-family: 'Inter', sans-serif; }
    .container { max-width: 600px; margin: 40px auto; padding: 20px; }
    h1 { margin-bottom: 24px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; }
    input, textarea, select {
      width: 100%; padding: 12px; background: #121212; border: 1px solid #2a2a2a;
      color: #f1f1f1; border-radius: 8px; font-family: inherit; font-size: 15px;
    }
    input:focus, textarea:focus, select:focus {
      outline: 2px solid #00c853; outline-offset: 2px; border-color: #00c853;
    }
    fieldset {
      border: 1px solid #1f1f1f; border-radius: 12px; padding: 20px; margin: 24px 0;
    }
    legend { padding: 0 8px; color: #00c853; font-weight: 600; }
    small { color: #616161; font-size: 12px; display: block; margin-top: 4px; }
    button {
      width: 100%; padding: 14px; background: #00c853; color: #000; border: none;
      border-radius: 10px; font-weight: 700; font-size: 16px; cursor: pointer;
      transition: all 0.2s;
    }
    button:hover { background: #00e676; transform: translateY(-1px); }
    button:disabled { background: #333; color: #666; cursor: not-allowed; }
    .erro-box {
      background: #2a0a0a; border: 1px solid #5a1a1a; color: #ff6e6e;
      padding: 16px; border-radius: 8px; margin-bottom: 20px; display: none;
    }
    .voltar { display: inline-block; margin-bottom: 20px; color: #9e9e9e; text-decoration: none; }
    .voltar:hover { color: #f1f1f1; }
  </style>
</head>
<body>
<div class="container">
  <a href="dashboard.html" class="voltar">← Voltar pro dashboard</a>
  <h1>💰 Criar nova vaquinha</h1>
  
  <div id="erro-box" class="erro-box"></div>
  
  <form id="form-vaquinha">
    <div class="form-group">
      <label for="titulo">Título da vaquinha *</label>
      <input type="text" id="titulo" required maxlength="100" placeholder="Ex: Ajuda pro tratamento do Bob">
    </div>

    <div class="form-group">
      <label for="descricao">Descrição</label>
      <textarea id="descricao" rows="4" maxlength="500" placeholder="Conte sua história"></textarea>
    </div>

    <div class="form-group">
      <label for="meta">Meta de arrecadação R$ *</label>
      <input type="text" id="meta" required placeholder="5.000,00" inputmode="decimal">
      <small>Digite apenas números. Ex: 5000 ou 40.000</small>
    </div>

    <fieldset>
      <legend>Dados para receber as doações</legend>
      
      <div class="form-group">
        <label for="pix-key-type">Tipo da sua chave Pix *</label>
        <select id="pix-key-type" required>
          <option value="">Selecione</option>
          <option value="CPF">CPF</option>
          <option value="EMAIL">E-mail</option>
          <option value="PHONE">Celular</option>
          <option value="EVP">Chave aleatória</option>
        </select>
      </div>

      <div class="form-group">
        <label for="pix-key">Sua chave Pix *</label>
        <input type="text" id="pix-key" required placeholder="Digite sem pontos, traços ou espaços">
        <small>O valor das doações vai direto pra esta conta</small>
      </div>

      <div class="form-group">
        <label for="beneficiary-name">Nome completo do titular *</label>
        <input type="text" id="beneficiary-name" required maxlength="25" placeholder="Igual está no banco">
        <small>Máx 25 caracteres - regra do Pix</small>
      </div>

      <div class="form-group">
        <label for="beneficiary-city">Cidade do titular *</label>
        <input type="text" id="beneficiary-city" required maxlength="15" placeholder="Ex: Taiobeiras">
        <small>Máx 15 caracteres - regra do Pix</small>
      </div>
    </fieldset>

    <button type="submit" id="btn-criar">Criar vaquinha</button>
  </form>
</div>

<script type="module">
import { supabase } from './supabase.js'

const erroBox = document.getElementById('erro-box')

function mostrarErro(msg) {
  erroBox.textContent = msg
  erroBox.style.display = 'block'
  console.error(msg)
}

// Formata o campo de meta enquanto digita
function formatarMoeda(input) {
  let valor = input.value.replace(/\D/g, '')
  if (!valor) {
    input.value = ''
    return
  }
  valor = (parseInt(valor) / 100).toFixed(2)
  valor = valor.replace('.', ',')
  valor = valor.replace(/\B(?=(\d{3})+(?!\d))/g, '.')
  input.value = valor
}

// Converte R$ 40.000,00 para 40000
function desformatarMoeda(valor) {
  return Number(valor.replace(/\./g, '').replace(',', '.')) || 0
}

document.getElementById('meta').addEventListener('input', (e) => formatarMoeda(e.target))

try {
  const { data: { user }, error: authError } = await supabase.auth.getUser()
  
  if (authError) throw authError
  if (!user) {
    mostrarErro('Você precisa estar logado. Redirecionando para login...')
    setTimeout(() => window.location.href = 'index.html', 2000)
    throw new Error('Não logado')
  }

  document.getElementById('form-vaquinha').addEventListener('submit', async (e) => {
    e.preventDefault()
    const btn = document.getElementById('btn-criar')
    btn.disabled = true
    btn.textContent = 'Criando...'
    erroBox.style.display = 'none'

    const metaValor = desformatarMoeda(document.getElementById('meta').value)
    
    if (metaValor < 10) {
      mostrarErro('A meta mínima é R$ 10,00')
      btn.disabled = false
      btn.textContent = 'Criar vaquinha'
      return
    }

    const pixData = {
      pix_key: document.getElementById('pix-key').value.replace(/\D/g,''),
      pix_key_type: document.getElementById('pix-key-type').value,
      beneficiary_name: document.getElementById('beneficiary-name').value.trim(),
      beneficiary_city: document.getElementById('beneficiary-city').value.trim()
    }

    const { error } = await supabase.from('campaigns').insert({
      title: document.getElementById('titulo').value,
      description: document.getElementById('descricao').value,
      goal: metaValor,
      user_id: user.id,
      current_amount: 0,
      status: 'active',
      metadata: pixData
    })

    if (error) {
      mostrarErro('Erro ao criar: ' + error.message)
      btn.disabled = false
      btn.textContent = 'Criar vaquinha'
    } else {
      window.location.href = 'dashboard.html'
    }
  })

} catch (err) {
  mostrarErro('Erro ao carregar página: ' + err.message + '. Verifique se o arquivo supabase.js existe.')
}
</script>
</body>
</html>
