<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Criar Vaquinha</title>
</head>
<body>

<h1>Criar Vaquinha</h1>

<form id="form">
  <input type="text" id="title" placeholder="Título" required><br><br>
  <textarea id="description" placeholder="Descrição"></textarea><br><br>
  <input type="number" id="goal" placeholder="Meta (R$)" required><br><br>

  <button type="submit">Criar</button>
</form>

<script type="module">
import { supabase } from './supabase.js'

document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault()

  const title = document.getElementById('title').value
  const description = document.getElementById('description').value
  const goal = document.getElementById('goal').value

  const { error } = await supabase.from('campaigns').insert([
    {
      title,
      description,
      goal,
      current_amount: 0
    }
  ])

  if (error) {
    alert('Erro ao criar')
    console.log(error)
  } else {
    alert('Criado com sucesso!')
    window.location.href = "index.html"
  }
})
</script>

</body>
</html>
