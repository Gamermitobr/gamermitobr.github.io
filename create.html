<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Vaquinha</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Criar Vaquinha</h1>

<div class="card">
  <form id="form">
    <input type="text" id="title" placeholder="Título" required class="input"><br><br>
    
    <textarea id="description" placeholder="Descrição" class="input"></textarea><br><br>
    
    <input type="number" id="goal" placeholder="Meta (R$)" required class="input"><br><br>

    <button type="submit">Criar</button>
  </form>
</div>

<script type="module">
import { supabase } from './supabase.js'

document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault()

  const { data: userData } = await supabase.auth.getUser()
  const user = userData.user

  if (!user) {
    alert("Faça login primeiro")
    return
  }

  const title = document.getElementById('title').value
  const description = document.getElementById('description').value
  const goal = document.getElementById('goal').value

  const { data, error } = await supabase.from('campaigns').insert([
    {
      title,
      description,
      goal,
      current_amount: 0,
      user_id: user.id
    }
  ]).select().single()

  if (error) {
    alert("Erro ao criar")
    console.log(error)
  } else {
    window.location.href = `campaign.html?id=${data.id}`
  }
})
</script>

</body>
</html>
