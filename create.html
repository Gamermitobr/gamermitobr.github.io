<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Vaquinha</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>➕ Criar Vaquinha</h1>

<div class="card">

  <input id="title" placeholder="Título" class="input">

  <textarea id="desc" placeholder="Descrição" class="input"></textarea>

  <input id="goal" type="number" placeholder="Meta" class="input">

  <button onclick="criar()">Criar</button>

</div>

<script type="module">
import { supabase } from './supabase.js'

window.criar = async function() {
  const { data: user } = await supabase.auth.getUser()

  if (!user.user) {
    alert("Faça login")
    return
  }

  await supabase.from('campaigns').insert([{
    title: title.value,
    description: desc.value,
    goal: goal.value,
    current_amount: 0,
    user_id: user.user.id
  }])

  alert("Criado com sucesso!")
}
</script>

</body>
</html>
