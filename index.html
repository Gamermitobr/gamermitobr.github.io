<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Gamer Store</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0d0d0d;
color:white;
}

header{
background:linear-gradient(90deg,#ff004c,#7a00ff);
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

#produtos{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:#1a1a1a;
padding:10px;
border-radius:10px;
text-align:center;
}

button{
background:#ff004c;
border:none;
padding:10px;
color:white;
border-radius:8px;
margin-top:5px;
}

#carrinhoBtn{
position:fixed;
bottom:10px;
left:10px;
right:10px;
background:#ff004c;
padding:15px;
text-align:center;
border-radius:10px;
}

</style>

</head>

<body>

<header>

<h2>🎮 Gamer Store</h2>

<div>🛒 <span id="cart">0</span></div>

</header>

<div id="produtos"></div>

<div id="carrinhoBtn" onclick="abrirPagamento()">
Carrinho
</div>

<script>

let carrinho = []

let contas = [

{nome:"Conta FF Rara",preco:20,login:"conta1@email.com",senha:"123456"},
{nome:"Conta FF Veterana",preco:25,login:"conta2@email.com",senha:"123456"},
{nome:"Conta FF Diamante",preco:30,login:"conta3@email.com",senha:"123456"},
{nome:"Conta FF Mestre",preco:35,login:"conta4@email.com",senha:"123456"},
{nome:"Conta FF Elite",preco:40,login:"conta5@email.com",senha:"123456"},
{nome:"Conta FF Ouro",preco:15,login:"conta6@email.com",senha:"123456"},
{nome:"Conta FF Platina",preco:18,login:"conta7@email.com",senha:"123456"},
{nome:"Conta FF Lendária",preco:45,login:"conta8@email.com",senha:"123456"},
{nome:"Conta FF Top",preco:50,login:"conta9@email.com",senha:"123456"},
{nome:"Conta FF Full Skin",preco:60,login:"conta10@email.com",senha:"123456"},
{nome:"Conta FF Antiga",preco:22,login:"conta11@email.com",senha:"123456"},
{nome:"Conta FF Evento",preco:26,login:"conta12@email.com",senha:"123456"},
{nome:"Conta FF Raríssima",preco:70,login:"conta13@email.com",senha:"123456"},
{nome:"Conta FF Pro",preco:80,login:"conta14@email.com",senha:"123456"},
{nome:"Conta FF Premium",preco:90,login:"conta15@email.com",senha:"123456"},
{nome:"Conta FF Old",preco:32,login:"conta16@email.com",senha:"123456"},
{nome:"Conta FF 2018",preco:55,login:"conta17@email.com",senha:"123456"},
{nome:"Conta FF 2019",preco:48,login:"conta18@email.com",senha:"123456"},
{nome:"Conta FF 2020",preco:38,login:"conta19@email.com",senha:"123456"},
{nome:"Conta FF Completa",preco:100,login:"conta20@email.com",senha:"123456"}

]

function carregar(){

let area = document.getElementById("produtos")

contas.forEach((c,i)=>{

area.innerHTML += `

<div class="card">

<h3>${c.nome}</h3>

<p>R$ ${c.preco}</p>

<button onclick="comprar(${i})">Comprar</button>

</div>

`

})

}

function comprar(i){

carrinho.push(contas[i])

document.getElementById("cart").innerText = carrinho.length

}

function abrirPagamento(){

if(carrinho.length == 0){

alert("Carrinho vazio")

return

}

let conta = carrinho[0]

alert(

"PIX para pagamento:\n\n" +

"chavepix@email.com\n\n" +

"Após pagar você receberá:\n\n" +

"LOGIN: "+conta.login+"\nSENHA: "+conta.senha

)

let vendas = localStorage.getItem("vendas") || 0

localStorage.setItem("vendas",parseInt(vendas)+1)

}

carregar()

</script>

</body>

</html>
