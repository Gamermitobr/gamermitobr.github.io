<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>🔥 Loja FF Contas Baratas</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

header{
background:linear-gradient(90deg,#ff0055,#7a00ff);
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

#produtos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:12px;
padding:12px;
}

.card{
background:#161616;
border-radius:12px;
padding:10px;
text-align:center;
}

.card img{
width:100%;
border-radius:8px;
}

button{
background:#ff0055;
border:none;
padding:10px;
border-radius:8px;
color:white;
margin-top:6px;
cursor:pointer;
}

#checkout{
position:fixed;
bottom:0;
left:0;
right:0;
background:#111;
padding:15px;
display:none;
}

#qr{
width:150px;
}

#adminBtn{
position:fixed;
top:5px;
right:5px;
opacity:0;
}

.install{
position:fixed;
bottom:15px;
right:15px;
}

</style>

</head>

<body>

<header>

<h2>🎮 FF Contas Baratas</h2>

<div>

🛒 <span id="cart">0</span> |
💰 <span id="vendas">0</span>

</div>

</header>

<div id="produtos"></div>

<div id="checkout">

<h3>Pagamento Pix</h3>

<img id="qr">

<p id="pixCode">b6739624-5d1d-4738-9ddc-a341a350c22b</p>

<button onclick="copiarPix()">Copiar Pix</button>

<button onclick="whats()">Receber Conta no WhatsApp</button>

</div>

<button id="adminBtn" onclick="admin()">.</button>

<button class="install" onclick="instalar()">📱 Instalar App</button>

<script>

let contas = JSON.parse(localStorage.getItem("contas")) || [

{nome:"Conta Iniciante 1",preco:5,img:"https://i.imgur.com/Z6X9Z8M.jpeg",login:"ff1@email.com",senha:"123"},
{nome:"Conta Iniciante 2",preco:6,img:"https://i.imgur.com/Z6X9Z8M.jpeg",login:"ff2@email.com",senha:"123"},
{nome:"Conta Iniciante 3",preco:7,img:"https://i.imgur.com/Z6X9Z8M.jpeg",login:"ff3@email.com",senha:"123"},
{nome:"Conta Iniciante 4",preco:8,img:"https://i.imgur.com/Z6X9Z8M.jpeg",login:"ff4@email.com",senha:"123"},
{nome:"Conta Iniciante 5",preco:9,img:"https://i.imgur.com/Z6X9Z8M.jpeg",login:"ff5@email.com",senha:"123"},
{nome:"Conta Iniciante 6",preco:10,img:"https://i.imgur.com/Z6X9Z8M.jpeg",login:"ff6@email.com",senha:"123"},
{nome:"Conta Iniciante 7",preco:11,img:"https://i.imgur.com/Z6X9Z8M.jpeg",login:"ff7@email.com",senha:"123"},
{nome:"Conta Iniciante 8",preco:12,img:"https://i.imgur.com/Z6X9Z8M.jpeg",login:"ff8@email.com",senha:"123"},
{nome:"Conta Iniciante 9",preco:13,img:"https://i.imgur.com/Z6X9Z8M.jpeg",login:"ff9@email.com",senha:"123"},
{nome:"Conta Iniciante 10",preco:15,img:"https://i.imgur.com/Z6X9Z8M.jpeg",login:"ff10@email.com",senha:"123"}

]

let carrinho=[]

let vendas = localStorage.getItem("vendas") || 0

document.getElementById("vendas").innerText=vendas

function carregar(){

let area=document.getElementById("produtos")

area.innerHTML=""

contas.forEach((c,i)=>{

area.innerHTML+=`

<div class="card">

<img src="${c.img}">

<h3>${c.nome}</h3>

<p>R$ ${c.preco}</p>

<button onclick="comprar(${i})">Comprar</button>

</div>

`

})

}

function comprar(i){

carrinho=[contas[i]]

document.getElementById("cart").innerText=1

let pix="b6739624-5d1d-4738-9ddc-a341a350c22b"

document.getElementById("pixCode").innerText=pix

document.getElementById("qr").src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data="+pix

document.getElementById("checkout").style.display="block"

}

function copiarPix(){

navigator.clipboard.writeText(document.getElementById("pixCode").innerText)

alert("Pix copiado")

}

function whats(){

let c=carrinho[0]

let msg="Conta Free Fire:\nLogin:"+c.login+"\nSenha:"+c.senha

window.open("https://wa.me/?text="+encodeURIComponent(msg))

contas.splice(contas.indexOf(c),1)

localStorage.setItem("contas",JSON.stringify(contas))

vendas++

localStorage.setItem("vendas",vendas)

document.getElementById("vendas").innerText=vendas

carregar()

}

function admin(){

let senha=prompt("Senha admin")

if(senha=="1234"){

let nome=prompt("Nome conta")

let preco=prompt("Preço")

let login=prompt("Login")

let senhaConta=prompt("Senha")

contas.push({nome,preco,login,senha:senhaConta,img:"https://i.imgur.com/Z6X9Z8M.jpeg"})

localStorage.setItem("contas",JSON.stringify(contas))

carregar()

}

}

function instalar(){

alert("Use o menu do navegador e clique em 'Adicionar à tela inicial'")

}

carregar()

</script>

</body>

</html>
