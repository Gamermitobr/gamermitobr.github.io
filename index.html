<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Gamer Store</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

header{
background:linear-gradient(90deg,#ff003c,#6a00ff);
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
padding:12px;
}

.card{
background:#1a1a1a;
border-radius:10px;
padding:10px;
box-shadow:0 0 10px #000;
}

.card img{
width:100%;
border-radius:6px;
}

.price{
color:#00ff9c;
font-size:18px;
}

button{
background:#ff003c;
border:none;
padding:10px;
border-radius:6px;
color:white;
width:100%;
margin-top:5px;
}

.panel{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000000dd;
display:none;
justify-content:center;
align-items:center;
}

.box{
background:#1a1a1a;
padding:20px;
border-radius:10px;
width:90%;
max-width:400px;
}

input{
width:100%;
padding:8px;
margin:5px 0;
}

</style>
</head>

<body>

<header>
🎮 Gamer Store
<div>🛒 <span id="cartcount">0</span></div>
</header>

<div class="grid" id="produtos"></div>

<button style="position:fixed;bottom:15px;right:15px" onclick="abrirCarrinho()">
Carrinho
</button>

<div class="panel" id="carrinho">
<div class="box">
<h3>Carrinho</h3>
<div id="itens"></div>
<p>Total: R$ <span id="total"></span></p>
<button onclick="pagar()">Pagar com Pix</button>
<button onclick="fechar()">Fechar</button>
</div>
</div>

<div class="panel" id="pixbox">
<div class="box">
<h3>Pagamento Pix</h3>

<p>Copiar código Pix:</p>

<textarea id="pixcode"></textarea>

<img id="qrcode">

<p>Após pagar você receberá a conta automaticamente</p>

<button onclick="entregar()">Confirmar pagamento</button>

</div>
</div>

<div class="panel" id="admin">
<div class="box">

<h3>Painel Admin</h3>

<input id="nome" placeholder="Nome produto">
<input id="preco" placeholder="Preço">
<input id="img" placeholder="Imagem">

<textarea id="contas" placeholder="Lista de contas (1 por linha)"></textarea>

<button onclick="addProduto()">Adicionar produto</button>

<p>Vendas: <span id="vendas"></span></p>

<button onclick="fechar()">Fechar</button>

</div>
</div>

<script>

let produtos=JSON.parse(localStorage.getItem("produtos"))||[]
let carrinho=[]
let vendas=Number(localStorage.getItem("vendas")||0)

function salvar(){
localStorage.setItem("produtos",JSON.stringify(produtos))
}

function render(){

let html=""

produtos.forEach((p,i)=>{

html+=`

<div class="card">

<img src="${p.img}">

<h3>${p.nome}</h3>

<div class="price">R$ ${p.preco}</div>

<p>Estoque: ${p.contas.length}</p>

<button onclick="addCarrinho(${i})">Comprar</button>

</div>

`

})

document.getElementById("produtos").innerHTML=html

}

function addProduto(){

let lista=document.getElementById("contas").value.split("\n")

produtos.push({

nome:nome.value,
preco:preco.value,
img:img.value,
contas:lista

})

salvar()
render()

}

function addCarrinho(i){

if(produtos[i].contas.length==0){
alert("Sem estoque")
return
}

carrinho.push(i)

cartcount.innerText=carrinho.length

}

function abrirCarrinho(){

let html=""
let total=0

carrinho.forEach(i=>{

html+=produtos[i].nome+"<br>"
total+=Number(produtos[i].preco)

})

itens.innerHTML=html
document.getElementById("total").innerText=total

carrinhoPanel=true

document.getElementById("carrinho").style.display="flex"

}

function pagar(){

let chave="SUA_CHAVE_PIX"

let payload="PIX-"+chave

pixcode.value=payload

qrcode.src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+payload

document.getElementById("pixbox").style.display="flex"

}

function entregar(){

let i=carrinho[0]

let conta=produtos[i].contas.shift()

alert("Conta entregue:\n"+conta)

vendas++

localStorage.setItem("vendas",vendas)

salvar()

carrinho=[]

render()

}

function fechar(){

document.querySelectorAll(".panel").forEach(p=>p.style.display="none")

}

render()

</script>

</body>
</html>
