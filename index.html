<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>🔥 Loja Free Fire</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0d0d0d;
color:white;
}

header{
background:linear-gradient(90deg,#ff004c,#7a00ff);
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

#produtos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:12px;
padding:12px;
}

.card{
background:#1a1a1a;
padding:12px;
border-radius:12px;
text-align:center;
box-shadow:0 0 10px #000;
}

.card h3{
font-size:15px;
}

button{
background:#ff004c;
border:none;
padding:10px;
border-radius:8px;
color:white;
margin-top:8px;
cursor:pointer;
}

#checkout{
position:fixed;
bottom:0;
left:0;
right:0;
background:#111;
padding:15px;
display:none;
}

#adminBtn{
position:fixed;
top:5px;
right:5px;
opacity:0;
}

</style>

</head>

<body>

<header>

<h2>🎮 Loja Free Fire</h2>

<div>

🛒 <span id="cart">0</span> |
💰 <span id="vendas">0</span>

</div>

</header>

<div id="produtos"></div>

<div id="checkout">

<h3>Pagamento Pix</h3>

<p id="pix">SUA-CHAVE-PIX</p>

<button onclick="copiarPix()">Copiar Pix</button>

<button onclick="receber()">Receber Conta</button>

</div>

<button id="adminBtn" onclick="admin()">.</button>

<script>

let contas = JSON.parse(localStorage.getItem("contas")) || [

{nome:"Conta FF Diamante",preco:25,login:"conta1@email.com",senha:"123"},
{nome:"Conta FF Veterana",preco:30,login:"conta2@email.com",senha:"123"},
{nome:"Conta FF Rara",preco:40,login:"conta3@email.com",senha:"123"},
{nome:"Conta FF Mestre",preco:45,login:"conta4@email.com",senha:"123"},
{nome:"Conta FF Elite",preco:50,login:"conta5@email.com",senha:"123"},
{nome:"Conta FF Lendária",preco:60,login:"conta6@email.com",senha:"123"},
{nome:"Conta FF Antiga",preco:35,login:"conta7@email.com",senha:"123"},
{nome:"Conta FF Pro",preco:70,login:"conta8@email.com",senha:"123"},
{nome:"Conta FF Premium",preco:80,login:"conta9@email.com",senha:"123"},
{nome:"Conta FF Full Skin",preco:100,login:"conta10@email.com",senha:"123"}

]

let carrinho=[]

let vendas = localStorage.getItem("vendas") || 0

document.getElementById("vendas").innerText=vendas

function carregar(){

let area=document.getElementById("produtos")

area.innerHTML=""

contas.forEach((c,i)=>{

area.innerHTML+=`

<div class="card">

<h3>${c.nome}</h3>

<p>R$ ${c.preco}</p>

<button onclick="comprar(${i})">Comprar</button>

</div>

`

})

}

function comprar(i){

carrinho=[contas[i]]

document.getElementById("cart").innerText=1

document.getElementById("checkout").style.display="block"

}

function copiarPix(){

navigator.clipboard.writeText("SUA-CHAVE-PIX")

alert("Pix copiado")

}

function receber(){

let c=carrinho[0]

alert("LOGIN: "+c.login+"\nSENHA: "+c.senha)

contas.splice(contas.indexOf(c),1)

localStorage.setItem("contas",JSON.stringify(contas))

vendas++

localStorage.setItem("vendas",vendas)

document.getElementById("vendas").innerText=vendas

carregar()

}

function admin(){

let senha=prompt("Senha admin")

if(senha=="1234"){

let nome=prompt("Nome conta")

let preco=prompt("Preço")

let login=prompt("Login")

let senhaConta=prompt("Senha")

contas.push({nome,preco,login,senha:senhaConta})

localStorage.setItem("contas",JSON.stringify(contas))

carregar()

}

}

carregar()

</script>

</body>

</html>
