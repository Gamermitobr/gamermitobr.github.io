<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Loja Gamer</title>

<style>

body{
font-family:Arial;
margin:0;
background:#0f0f0f;
color:white;
}

header{
background:#141414;
padding:15px;
display:flex;
justify-content:space-between;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
padding:12px;
}

.card{
background:#1c1c1c;
padding:10px;
border-radius:10px;
}

.card img{
width:100%;
border-radius:6px;
}

button{
background:#00c853;
border:none;
padding:10px;
border-radius:6px;
color:white;
cursor:pointer;
}

.panel{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000000d0;
display:none;
justify-content:center;
align-items:center;
}

.box{
background:#1c1c1c;
padding:20px;
border-radius:10px;
width:90%;
max-width:400px;
}

input{
width:100%;
padding:8px;
margin:6px 0;
}

</style>

</head>

<body>

<header>

<div>🕹 Loja Gamer</div>

<div>
🛒 <span id="cartcount">0</span>
</div>

</header>

<div class="grid" id="produtos"></div>

<button onclick="abrirCarrinho()" style="position:fixed;bottom:10px;right:10px;">
Carrinho
</button>

<div class="panel" id="carrinho">

<div class="box">

<h3>Carrinho</h3>

<div id="itens"></div>

<p>Total: R$ <span id="total"></span></p>

<button onclick="pagar()">Pagar</button>

<button onclick="fechar()">Fechar</button>

</div>

</div>

<div class="panel" id="pix">

<div class="box">

<h3>Pagar com Pix</h3>

<img id="qrcode">

<p id="pixcode"></p>

<button onclick="fechar()">Fechar</button>

</div>

</div>

<div class="panel" id="login">

<div class="box">

<h3>Login Admin</h3>

<input id="user" placeholder="Usuário">

<input id="pass" placeholder="Senha" type="password">

<button onclick="login()">Entrar</button>

</div>

</div>

<div class="panel" id="admin">

<div class="box">

<h3>Painel Admin</h3>

<input id="nome" placeholder="Nome">

<input id="preco" placeholder="Preço">

<input id="estoque" placeholder="Estoque">

<input id="img" placeholder="Imagem">

<button onclick="addProduto()">Adicionar</button>

<p>Vendas: <span id="vendas"></span></p>

<button onclick="fechar()">Fechar</button>

</div>

</div>

<script>

let produtos=JSON.parse(localStorage.getItem("produtos"))||[]
let carrinho=[]
let vendas=Number(localStorage.getItem("vendas")||0)

function salvar(){
localStorage.setItem("produtos",JSON.stringify(produtos))
}

function render(){

let html=""

produtos.forEach((p,i)=>{

html+=`

<div class="card">

<img src="${p.img}">

<h3>${p.nome}</h3>

<p>R$ ${p.preco}</p>

<p>Estoque: ${p.estoque}</p>

<button onclick="addCarrinho(${i})">Comprar</button>

</div>

`

})

document.getElementById("produtos").innerHTML=html

}

function addProduto(){

let nome=nome.value
let preco=preco.value
let estoque=estoque.value
let img=img.value

produtos.push({nome,preco,estoque,img})

salvar()
render()

}

function addCarrinho(i){

if(produtos[i].estoque<=0){
alert("Sem estoque")
return
}

carrinho.push(produtos[i])

document.getElementById("cartcount").innerText=carrinho.length

}

function abrirCarrinho(){

let html=""
let total=0

carrinho.forEach(p=>{
html+=p.nome+" R$"+p.preco+"<br>"
total+=Number(p.preco)
})

itens.innerHTML=html
total.innerText=total

carrinhoPanel=true

document.getElementById("carrinho").style.display="flex"

}

function pagar(){

vendas++

localStorage.setItem("vendas",vendas)

let chave="SUA_CHAVE_PIX"

let valor=10

let payload=`00020126360014BR.GOV.BCB.PIX0114${chave}520400005303986540${valor}5802BR5913Loja Gamer6009SaoPaulo62070503***6304`

pixcode.innerText=payload

qrcode.src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+payload

document.getElementById("pix").style.display="flex"

}

function login(){

let u=user.value
let p=pass.value

if(u=="admin" && p=="1234"){

document.getElementById("login").style.display="none"
document.getElementById("admin").style.display="flex"

vendas.innerText=localStorage.getItem("vendas")||0

}else{

alert("Login errado")

}

}

function fechar(){

document.querySelectorAll(".panel").forEach(p=>p.style.display="none")

}

render()

</script>

</body>
</html>
