<!DOCTYPE html>
<html>
<head>
  <title>Lista de Inscritos</title>
</head>
<body>
  <h1>Lista de Inscritos</h1>
  <ul id="inscritos"></ul>

  <script>
    fetch('inscritos.txt')
      .then(response => response.text())
      .then(data => {
        const inscritos = data.split('\n');
        const ul = document.getElementById('inscritos');
        inscritos.forEach(inscrito => {
          if (inscrito !== '') {
            const li = document.createElement('li');
            li.textContent = inscrito;
            ul.appendChild(li);
          }
        });
      });
  </script>
</body>
</html>
