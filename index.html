<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gamer Store</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0e0e0e;
color:white;
}

header{
background:linear-gradient(90deg,#ff004c,#7b00ff);
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:18px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

.card{
background:#1b1b1b;
border-radius:10px;
padding:10px;
box-shadow:0 0 8px #000;
}

.card img{
width:100%;
border-radius:6px;
}

.price{
color:#00ffae;
font-size:18px;
}

button{
background:#ff004c;
border:none;
padding:10px;
border-radius:6px;
color:white;
width:100%;
margin-top:5px;
}

.panel{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000000dd;
display:none;
justify-content:center;
align-items:center;
}

.box{
background:#1b1b1b;
padding:20px;
border-radius:10px;
width:90%;
max-width:400px;
}

input,textarea{
width:100%;
padding:8px;
margin:5px 0;
background:#111;
color:white;
border:none;
}

</style>

</head>

<body>

<header onclick="abrirLogin()">
🎮 Gamer Store
<div>🛒 <span id="cartcount">0</span></div>
</header>

<div class="grid" id="produtos"></div>

<button style="position:fixed;bottom:20px;right:20px" onclick="abrirCarrinho()">
Carrinho
</button>

<div class="panel" id="carrinho">
<div class="box">
<h3>Carrinho</h3>
<div id="itens"></div>
<p>Total: R$ <span id="total"></span></p>
<button onclick="pagar()">Pagar Pix</button>
<button onclick="fechar()">Fechar</button>
</div>
</div>

<div class="panel" id="pix">
<div class="box">

<h3>Pagamento Pix</h3>

<textarea id="pixcode"></textarea>

<img id="qrcode">

<button onclick="copiarPix()">Copiar Pix</button>

<button onclick="entregar()">Confirmar pagamento</button>

</div>
</div>

<div class="panel" id="login">
<div class="box">

<h3>Admin</h3>

<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

</div>
</div>

<div class="panel" id="admin">
<div class="box">

<h3>Painel Admin</h3>

<input id="nome" placeholder="Nome produto">
<input id="preco" placeholder="Preço">
<input id="img" placeholder="Imagem">

<textarea id="contas" placeholder="Lista de contas (1 por linha)"></textarea>

<button onclick="addProduto()">Adicionar produto</button>

<button onclick="fechar()">Fechar</button>

</div>
</div>

<script>

let produtos=JSON.parse(localStorage.getItem("produtos"))||[

{
nome:"Conta Free Fire Rara",
preco:20,
img:"https://i.imgur.com/YG9YF7D.jpeg",
contas:[
"login1@email.com | senha123",
"login2@email.com | senha456",
"login3@email.com | senha789"
]
},

{
nome:"Conta Free Fire Veterana",
preco:35,
img:"https://i.imgur.com/YG9YF7D.jpeg",
contas:[
"conta1@email.com | senha111",
"conta2@email.com | senha222",
"conta3@email.com | senha333"
]
},

{
nome:"Conta FF Full Skin",
preco:50,
img:"https://i.imgur.com/YG9YF7D.jpeg",
contas:[
"skin1@email.com | senha111",
"skin2@email.com | senha222",
"skin3@email.com | senha333"
]
}

]

let carrinho=[]

function salvar(){
localStorage.setItem("produtos",JSON.stringify(produtos))
}

function render(){

let html=""

produtos.forEach((p,i)=>{

html+=`

<div class="card">

<img src="${p.img}">

<h3>${p.nome}</h3>

<div class="price">R$ ${p.preco}</div>

<p>Estoque: ${p.contas.length}</p>

<button onclick="addCarrinho(${i})">Comprar</button>

</div>

`

})

document.getElementById("produtos").innerHTML=html

}

function addCarrinho(i){

if(produtos[i].contas.length==0){

alert("Sem estoque")
return

}

carrinho.push(i)

cartcount.innerText=carrinho.length

}

function abrirCarrinho(){

let html=""
let total=0

carrinho.forEach(i=>{

html+=produtos[i].nome+"<br>"
total+=produtos[i].preco

})

itens.innerHTML=html
document.getElementById("total").innerText=total

document.getElementById("carrinho").style.display="flex"

}

function pagar(){

let chave="SUA_CHAVE_PIX"

pixcode.value=chave

qrcode.src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+chave

document.getElementById("pix").style.display="flex"

}

function copiarPix(){

navigator.clipboard.writeText(pixcode.value)

alert("Pix copiado")

}

function entregar(){

let i=carrinho[0]

let conta=produtos[i].contas.shift()

alert("Conta entregue:\n"+conta)

salvar()

carrinho=[]

render()

}

function abrirLogin(){

document.getElementById("login").style.display="flex"

}

function login(){

if(user.value=="admin" && pass.value=="1234"){

login.style.display="none"

admin.style.display="flex"

}else{

alert("Login errado")

}

}

function addProduto(){

let lista=contas.value.split("\n")

produtos.push({

nome:nome.value,
preco:preco.value,
img:img.value,
contas:lista

})

salvar()
render()

}

function fechar(){

document.querySelectorAll(".panel").forEach(p=>p.style.display="none")

}

render()

</script>

</body>
</html>
