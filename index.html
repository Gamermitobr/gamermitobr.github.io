<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>ClipLive - Corte vídeos do YouTube</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Corte vídeos do YouTube!</h1>
  <form id="uploadForm">
    <input type="text" id="videoLink" placeholder="Link do YouTube">
    <video id="videoPreview" controls></video>
    <div>
      <label>Início (s):</label>
      <input type="number" id="startTime" step="1">
      <label>Fim (s):</label>
      <input type="number" id="endTime" step="1">
    </div>
    <button type="submit">Cortar e baixar</button>
  </form>

  <script src="script.js"></script>
</body>
</html>
