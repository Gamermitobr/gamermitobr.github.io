<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>ClipLive</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Corte vídeos de live!</h1>
  <form id="uploadForm">
    <input type="file" accept="video/*" id="videoUpload">
    <video id="videoPreview" controls></video>
    <div>
      <label>Início:</label>
      <input type="number" id="startTime" step="1">
      <label>Fim:</label>
      <input type="number" id="endTime" step="1">
    </div>
    <button type="submit">Cortar e baixar</button>
  </form>

  <script src="script.js"></script>
</body>
</html>
